---
- name: Verify desktop setup
  hosts: localhost
  gather_facts: true

  pre_tasks:
      - name: Set effective platform
        ansible.builtin.set_fact:
            effective_platform: "{{ 'windows' if (ansible_env.WSL_DISTRO_NAME is defined or 'microsoft' in ansible_kernel | lower) else ansible_os_family | lower }}"

  vars:
      tools_to_verify:
          - cmd: "git --version"
            name: "git"
          - cmd: "just --version"
            name: "just"
          - cmd: "uv --version"
            name: "uv"
          - cmd: "fzf --version"
            name: "fzf"
          - cmd: "bat --version"
            name: "bat"
          - cmd: "eza --version"
            name: "eza"
          - cmd: "rg --version"
            name: "ripgrep"
          - cmd: "jq --version"
            name: "jq"
          - cmd: "starship --version"
            name: "starship"
          - cmd: "cargo --version"
            name: "cargo"
          - cmd: "dotnet --version"
            name: "dotnet"
          - cmd: "pnpm --version"
            name: "pnpm"
          - cmd: "uv python list"
            name: "uv-python"
          - cmd: "gh --version"
            name: "gh"
          - cmd: "git-lfs --version"
            name: "git-lfs"
          - cmd: "lazygit --version"
            name: "lazygit"
          - cmd: "lefthook version"
            name: "lefthook"
          - cmd: "mlr --version"
            name: "miller"
          - cmd: "fd --version"
            name: "fd"
          - cmd: "ffmpeg -version"
            name: "ffmpeg"
          - cmd: "delta --version"
            name: "delta"
          - cmd: "btm --version"
            name: "bottom"
          - cmd: "yq --version"
            name: "yq"
          - cmd: "zoxide --version"
            name: "zoxide"
          - cmd: "shellcheck --version"
            name: "shellcheck"
          - cmd: "rga --version"
            name: "ripgrep-all"
          - cmd: "atuin --version"
            name: "atuin"
          - cmd: "claude --version"
            name: "claude-code"
          - cmd: "dust --version"
            name: "dust"
          - cmd: "tldr --version"
            name: "tlrc"
          - cmd: "exiftool -ver"
            name: "exiftool"
          - cmd: "dot -V"
            name: "graphviz"
          - cmd: "markdownlint-cli2 --version"
            name: "markdownlint-cli2"
          - cmd: "pdfinfo -v"
            name: "poppler"
          - cmd: "shfmt --version"
            name: "shfmt"
          - cmd: "svgo --version"
            name: "svgo"
          - cmd: "vale --version"
            name: "vale"
          - cmd: "gitleaks version"
            name: "gitleaks"
          - cmd: "taplo --version"
            name: "taplo"

      windows_tools_to_verify:
          - cmd: "git --version"
            name: "git"
          - cmd: "just --version"
            name: "just"
          - cmd: "fzf --version"
            name: "fzf"
          - cmd: "bat --version"
            name: "bat"
          - cmd: "eza --version"
            name: "eza"
          - cmd: "rg --version"
            name: "ripgrep"
          - cmd: "jq --version"
            name: "jq"
          - cmd: "starship --version"
            name: "starship"
          - cmd: "node --version"
            name: "node"
          - cmd: "python --version"
            name: "python"
          - cmd: "cargo --version"
            name: "cargo"
          - cmd: "pnpm --version"
            name: "pnpm"
          - cmd: "dotnet --version"
            name: "dotnet"
          - cmd: "dotnet --list-runtimes"
            name: "dotnet-runtimes"
          - cmd: "pwsh --version"
            name: "powershell"
          - cmd: "gh --version"
            name: "gh"
          - cmd: "git-lfs --version"
            name: "git-lfs"
          - cmd: "lazygit --version"
            name: "lazygit"
          - cmd: "lefthook version"
            name: "lefthook"
          - cmd: "mlr --version"
            name: "miller"
          - cmd: "fd --version"
            name: "fd"
          - cmd: "ffmpeg -version"
            name: "ffmpeg"
          - cmd: "delta --version"
            name: "delta"
          - cmd: "btm --version"
            name: "bottom"
          - cmd: "yq --version"
            name: "yq"
          - cmd: "zoxide --version"
            name: "zoxide"
          - cmd: "shellcheck --version"
            name: "shellcheck"
          - cmd: "rga --version"
            name: "ripgrep-all"
          - cmd: "exiftool -ver"
            name: "exiftool"
          - cmd: "dot -V"
            name: "graphviz"
          - cmd: "shfmt --version"
            name: "shfmt"
          - cmd: "vale --version"
            name: "vale"
          - cmd: "gitleaks version"
            name: "gitleaks"

      dotfiles_to_verify:
          - path: "{{ ansible_env.HOME }}/.config/atuin/config.toml"
            name: "atuin config"
          - path: "{{ ansible_env.HOME }}/.config/bat/config"
            name: "bat config"
          - path: "{{ ansible_env.HOME }}/.config/bottom/bottom.toml"
            name: "bottom config"
          - path: "{{ ansible_env.HOME }}/Library/Application Support/com.mitchellh.ghostty/config"
            name: "ghostty config"
          - path: "{{ ansible_env.HOME }}/.gitignore_global"
            name: "global gitignore"
          - path: "{{ ansible_env.HOME }}/.config/ripgrep/rc"
            name: "ripgrep config"
          - path: "{{ ansible_env.HOME }}/.config/starship.toml"
            name: "starship config"

  tasks:
      - name: Verify tool is installed and functional
        ansible.builtin.command: "{{ item.cmd }}"
        loop: "{{ tools_to_verify }}"
        loop_control:
            label: "{{ item.name }}"
        register: verify_results
        changed_when: false
        environment:
            PATH: "{{ ansible_env.HOME }}/.cargo/bin:/opt/homebrew/bin:{{ ansible_env.HOME }}/.local/bin:/snap/bin:{{ ansible_env.PATH }}"
        when: effective_platform != "windows"

      - name: Print verified versions
        ansible.builtin.debug:
            msg: "OK {{ item.item.name }}: {{ (item.stdout_lines + item.stderr_lines) | first | default('?') }}"
        loop: "{{ verify_results.results }}"
        loop_control:
            label: "{{ item.item.name }}"
        when: effective_platform != "windows"

      - name: Verify Node.js is installed via nvm
        ansible.builtin.shell: |
            . /opt/homebrew/opt/nvm/nvm.sh 2>/dev/null || . ~/.nvm/nvm.sh 2>/dev/null
            node --version
        args:
            executable: /bin/bash
        register: node_version
        changed_when: false
        failed_when: node_version.rc != 0
        when: effective_platform != "windows"

      - name: Print Node.js version
        ansible.builtin.debug:
            msg: "OK node: {{ node_version.stdout_lines[0] }}"
        when: effective_platform != "windows"

      - name: Verify dotfiles are deployed
        ansible.builtin.stat:
            path: "{{ item.path }}"
        register: dotfile_stats
        loop: "{{ dotfiles_to_verify }}"
        loop_control:
            label: "{{ item.name }}"
        when: effective_platform != "windows"

      - name: Assert dotfiles are present
        ansible.builtin.assert:
            that: item.stat.exists
            fail_msg: "{{ item.item.name }} not found at {{ item.item.path }}"
            success_msg: "OK {{ item.item.name }}: present"
        loop: "{{ dotfile_stats.results }}"
        loop_control:
            label: "{{ item.item.name }}"
        when: effective_platform != "windows"

      - name: Verify global gitignore is configured # noqa: command-instead-of-module
        ansible.builtin.command: git config --global core.excludesfile
        register: git_excludes
        changed_when: false
        failed_when: git_excludes.rc != 0
        when: effective_platform != "windows"

      - name: Print global gitignore path
        ansible.builtin.debug:
            msg: "OK git: core.excludesfile = {{ git_excludes.stdout | trim }}"
        when: effective_platform != "windows"

      - name: Verify scripts are deployed and executable
        ansible.builtin.stat:
            path: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
        register: script_stats
        loop:
            - ff
            - ll
        when: effective_platform != "windows"

      - name: Assert scripts are executable
        ansible.builtin.assert:
            that:
                - item.stat.exists
                - item.stat.executable
            fail_msg: "{{ item.item }} not found or not executable at ~/.local/bin/{{ item.item }}"
            success_msg: "OK {{ item.item }}: deployed and executable"
        loop: "{{ script_stats.results }}"
        loop_control:
            label: "{{ item.item }}"
        when: effective_platform != "windows"

      - name: Verify ll runs successfully
        ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/ll ."
        changed_when: false
        register: ll_result
        when: effective_platform != "windows"

      - name: Print ll result
        ansible.builtin.debug:
            msg: "OK ll: listed {{ ll_result.stdout_lines | length }} lines"
        when: effective_platform != "windows"

      - name: Verify Windows tool is installed and functional
        ansible.builtin.shell: 'powershell.exe -NoProfile -Command "{{ item.cmd }}" 2>/dev/null' # noqa: risky-shell-pipe
        loop: "{{ windows_tools_to_verify }}"
        loop_control:
            label: "{{ item.name }}"
        register: windows_verify_results
        changed_when: false
        failed_when: false
        environment:
            PATH: "/mnt/c/Windows/System32/WindowsPowerShell/v1.0:/mnt/c/Windows/System32:{{ ansible_env.PATH }}"
        when: effective_platform == "windows"

      - name: Print verified Windows versions
        ansible.builtin.debug:
            msg: "{{ 'OK' if item.rc == 0 else 'MISSING' }} {{ item.item.name }}{{ ': ' + item.stdout_lines[0] if item.stdout_lines else '' }}"
        loop: "{{ windows_verify_results.results }}"
        loop_control:
            label: "{{ item.item.name }}"
        when: effective_platform == "windows"

      - name: Reminder about git signing
        ansible.builtin.debug:
            msg: |
                Git signing is not managed by this setup.
                To enable SSH signing, run:
                  git config --global gpg.format ssh
                  git config --global user.signingkey ~/.ssh/<key>.pub
                  git config --global commit.gpgsign true
