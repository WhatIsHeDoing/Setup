---
- name: Upgrade all packages and tools
  hosts: localhost
  gather_facts: true

  tasks:
      - name: Upgrade Homebrew packages and casks
        community.general.homebrew:
            update_homebrew: true
            upgrade_all: true
        when: ansible_os_family == "Darwin"

      - name: Upgrade apt packages
        ansible.builtin.apt:
            upgrade: full
            update_cache: true
            autoclean: true
            autoremove: true
        become: true
        when: ansible_os_family == "Debian"

      - name: Upgrade Mise tools
        ansible.builtin.command: mise upgrade
        changed_when: true
        environment:
            PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"

      - name: Update Rust toolchain via rustup
        ansible.builtin.command: rustup update
        changed_when: true
        environment:
            PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"

      - name: Update all installed Cargo packages
        ansible.builtin.command: cargo install-update -a
        changed_when: false
        failed_when: false
        environment:
            PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"

      - name: Upgrade global pnpm packages
        ansible.builtin.command: pnpm update -g
        changed_when: false
        environment:
            PATH: "{{ ansible_env.HOME }}/.local/share/mise/shims:{{ ansible_env.PATH }}"

      - name: Upgrade pip packages
        ansible.builtin.command: "pip install --user --upgrade {{ pip_packages | join(' ') }}"
        environment:
            PATH: "{{ ansible_env.HOME }}/.local/share/mise/shims:{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"
        changed_when: false
