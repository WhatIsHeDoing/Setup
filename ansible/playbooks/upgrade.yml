---
- name: Upgrade all packages and tools
  hosts: localhost
  gather_facts: true
  pre_tasks:
      - name: Find uv binary
        ansible.builtin.command: which uv
        register: uv_available
        failed_when: false
        changed_when: false
        environment:
            PATH: "/opt/homebrew/bin:{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"

  tasks:
      - name: Upgrade Homebrew packages and casks
        community.general.homebrew:
            update_homebrew: true
            upgrade_all: true
        when: ansible_os_family == "Darwin"

      - name: Upgrade apt packages
        ansible.builtin.apt:
            upgrade: full
            update_cache: true
            autoclean: true
            autoremove: true
        become: true
        when: ansible_os_family == "Debian"

      - name: Install latest Node.js LTS via nvm (macOS)
        ansible.builtin.shell: |
            . /opt/homebrew/opt/nvm/nvm.sh
            nvm install --lts
            nvm alias default lts/*
        args:
            executable: /bin/bash
        changed_when: true
        failed_when: false
        when: ansible_os_family == "Darwin"

      - name: Install latest Node.js LTS via nvm (Ubuntu)
        ansible.builtin.shell: |
            . ~/.nvm/nvm.sh
            nvm install --lts
            nvm alias default lts/*
        args:
            executable: /bin/bash
        changed_when: true
        failed_when: false
        when: ansible_os_family == "Debian"

      - name: Upgrade Python tools via uv
        ansible.builtin.command: uv tool upgrade --all
        changed_when: true
        failed_when: false
        environment:
            PATH: "/opt/homebrew/bin:{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"
        when: uv_available.rc == 0

      - name: Update Rust toolchain via rustup
        ansible.builtin.command: rustup update
        changed_when: true
        failed_when: false
        environment:
            PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"

      - name: Update all installed Cargo packages
        ansible.builtin.command: cargo install-update -a
        changed_when: false
        failed_when: false
        environment:
            PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"

      - name: Upgrade global pnpm packages
        ansible.builtin.command: pnpm update -g
        changed_when: false
        failed_when: false
        environment:
            PATH: "/opt/homebrew/bin:{{ ansible_env.HOME }}/.local/share/pnpm:{{ ansible_env.PATH }}"
            PNPM_HOME: "{{ ansible_env.HOME }}/.local/share/pnpm"
