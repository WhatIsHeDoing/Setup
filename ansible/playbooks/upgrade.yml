---
- name: Upgrade all packages and tools
  hosts: localhost
  gather_facts: true
  pre_tasks:
      - name: Find uv binary
        ansible.builtin.command: which uv
        register: uv_available
        failed_when: false
        changed_when: false
        environment:
            PATH: "{{ homebrew_bin }}:{{ local_bin }}:{{ ansible_env.PATH }}"

  tasks:
      - name: Upgrade Homebrew packages and casks
        community.general.homebrew:
            update_homebrew: true
            upgrade_all: true
        when: ansible_os_family == "Darwin"

      - name: Upgrade apt packages
        ansible.builtin.apt:
            upgrade: full
            update_cache: true
            autoclean: true
            autoremove: true
        become: true
        when: ansible_os_family == "Debian"

      - name: Install latest Node.js LTS via nvm
        ansible.builtin.shell: |
            . {{ nvm_sh }}
            nvm install --lts
            nvm alias default lts/*
        args:
            executable: /bin/bash
        changed_when: true
        failed_when: false
        when: ansible_os_family in ["Darwin", "Debian"]

      - name: Upgrade Python tools via uv
        ansible.builtin.command: uv tool upgrade --all
        changed_when: true
        failed_when: false
        environment:
            PATH: "{{ homebrew_bin }}:{{ local_bin }}:{{ ansible_env.PATH }}"
        when: uv_available.rc == 0

      - name: Update Rust toolchain via rustup
        ansible.builtin.command: rustup update
        changed_when: true
        failed_when: false
        environment:
            PATH: "{{ cargo_bin }}:{{ local_bin }}:{{ ansible_env.PATH }}"

      - name: Update all installed Cargo packages
        ansible.builtin.command: cargo install-update -a
        changed_when: false
        failed_when: false
        environment:
            PATH: "{{ cargo_bin }}:{{ ansible_env.PATH }}"

      - name: Upgrade global pnpm packages
        ansible.builtin.command: pnpm update -g
        changed_when: false
        failed_when: false
        environment:
            PATH: "{{ homebrew_bin }}:{{ pnpm_home }}:{{ ansible_env.PATH }}"
            PNPM_HOME: "{{ pnpm_home }}"
