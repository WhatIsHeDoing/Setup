---
# Git configuration applied on all platforms
git_config:
    # Delete local branches whose upstream has been removed (e.g. after
    # the remote head branch was auto-deleted post-merge). Safe to run
    # repeatedly: no-op when nothing is gone.
    alias.cleanup-gone: "!git branch -vv | awk '/: gone]/{print $1}' | xargs -r git branch -D"
    branch.sort: "-committerdate"
    column.ui: "auto"
    commit.verbose: "true"
    core.excludesFile: "~/.gitignore_global"
    core.pager: "delta"
    delta.navigate: "true"
    delta.dark: "true"
    diff.algorithm: "histogram"
    diff.colorMoved: "default"
    fetch.prune: "true"
    fetch.pruneTags: "true"
    help.autocorrect: "prompt"
    init.defaultBranch: "main"
    interactive.diffFilter: "delta --color-only"
    merge.conflictstyle: "zdiff3"
    pull.rebase: "false"
    push.autoSetupRemote: "true"
    push.default: "current"
    push.followTags: "true"
    rebase.autosquash: "true"
    rebase.autostash: "true"
    rerere.enabled: "true"
    tag.sort: "version:refname"

# ── Shell / PATH fragments ───────────────────────────────────────────────
# Reused wherever a task invokes a freshly installed tool before a new shell
# picks it up on PATH. The Homebrew prefix follows the CPU — Apple Silicon
# under /opt/homebrew, Intel Macs under /usr/local — matching the dual check
# in roles/bootstrap/tasks/darwin.yml. Vars are evaluated lazily, so the
# Linux-irrelevant Homebrew paths never resolve on Debian/Windows.
homebrew_prefix: "{{ '/opt/homebrew' if ansible_architecture == 'arm64' else '/usr/local' }}"
homebrew_bin: "{{ homebrew_prefix }}/bin"
cargo_bin: "{{ ansible_env.HOME }}/.cargo/bin"
local_bin: "{{ ansible_env.HOME }}/.local/bin"
pnpm_home: "{{ ansible_env.HOME }}/.local/share/pnpm"
pnpm_bin: "{{ pnpm_home }}/bin"

# Location of nvm.sh to source — a Homebrew keg on macOS, ~/.nvm on Linux.
# Keyed on ansible_os_family so it resolves in both install and upgrade plays
# (the upgrade play does not set effective_platform).
nvm_sh: "{{ (homebrew_prefix ~ '/opt/nvm/nvm.sh') if ansible_os_family == 'Darwin' else (ansible_env.HOME ~ '/.nvm/nvm.sh') }}"

# Cargo packages installed on all platforms (via cargo-binstall — prebuilt
# binaries where available, falling back to a source build otherwise).
cargo_packages:
    - bottom
    - cargo-modules
    - cargo-outdated
    - cargo-update
    - diskonaut
    - wasm-pack

# macOS installs ripgrep-all from Homebrew (roles/tools/vars/darwin.yml), so
# building it from cargo there would be a redundant second copy. Debian and
# Windows have no apt/winget source for it, so they build it from cargo here.
cargo_packages_non_darwin:
    - ripgrep_all

# Python tools installed on all platforms via uv tool install
pip_packages:
    - ansible-core
    - ansible-lint
    - checkov
    - commitizen
    - ipykernel
    - yamllint

# Claude Code MCP servers configured at user scope
mcp_servers:
    - name: cloudflare
      command: npx @cloudflare/mcp-server-cloudflare
    - name: context7
      command: npx @upstash/context7-mcp
    - name: github
      command: npx @modelcontextprotocol/server-github
    - name: playwright
      command: npx @playwright/mcp@latest

# pnpm packages installed globally on all platforms
pnpm_packages:
    - cspell

# VS Code extensions installed on all platforms
vscode_extensions:
    - davidanson.vscode-markdownlint
    - eamodio.gitlens
    - editorconfig.editorconfig
    - sdras.night-owl
    - usernamehw.errorlens
    - vscode-icons-team.vscode-icons
