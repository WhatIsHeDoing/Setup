---
# Git configuration applied on all platforms
git_config:
    # Delete local branches whose upstream has been removed (e.g. after
    # the remote head branch was auto-deleted post-merge). Safe to run
    # repeatedly: no-op when nothing is gone.
    alias.cleanup-gone: "!git branch -vv | awk '/: gone]/{print $1}' | xargs -r git branch -D"
    branch.sort: "-committerdate"
    column.ui: "auto"
    commit.verbose: "true"
    core.excludesFile: "~/.gitignore_global"
    core.pager: "delta"
    delta.navigate: "true"
    delta.dark: "true"
    diff.algorithm: "histogram"
    diff.colorMoved: "default"
    fetch.prune: "true"
    fetch.pruneTags: "true"
    help.autocorrect: "prompt"
    init.defaultBranch: "main"
    interactive.diffFilter: "delta --color-only"
    merge.conflictstyle: "zdiff3"
    pull.rebase: "false"
    push.autoSetupRemote: "true"
    push.default: "current"
    push.followTags: "true"
    rebase.autosquash: "true"
    rebase.autostash: "true"
    rerere.enabled: "true"
    tag.sort: "version:refname"

# Cargo packages installed on all platforms
cargo_packages:
    - bottom
    - cargo-modules
    - cargo-outdated
    - cargo-update
    - diskonaut
    - ripgrep_all
    - taplo-cli
    - wasm-pack

# Python tools installed on all platforms via uv tool install
pip_packages:
    - ansible-core
    - ansible-lint
    - checkov
    - commitizen
    - ipykernel
    - yamllint

# Claude Code MCP servers configured at user scope
mcp_servers:
    - name: cloudflare
      command: npx @cloudflare/mcp-server-cloudflare
    - name: context7
      command: npx @upstash/context7-mcp
    - name: github
      command: npx @modelcontextprotocol/server-github
    - name: playwright
      command: npx @playwright/mcp@latest

# pnpm packages installed globally on all platforms
pnpm_packages:
    - cspell

# VS Code extensions installed on all platforms
vscode_extensions:
    - davidanson.vscode-markdownlint
    - eamodio.gitlens
    - editorconfig.editorconfig
    - sdras.night-owl
    - usernamehw.errorlens
    - vscode-icons-team.vscode-icons
