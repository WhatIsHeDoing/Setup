---
- name: Install WinGet tools
  ansible.builtin.shell: >
    winget.exe install {{ item }}
    --accept-source-agreements
    --accept-package-agreements
    --silent
    --disable-interactivity
  loop: "{{ winget_tools }}"
  changed_when: false
  failed_when: false

- name: Install ripgrep-all (rga)
  ansible.builtin.command: cargo.exe install ripgrep_all
  args:
      creates: "{{ ansible_env.USERPROFILE }}\\.cargo\\bin\\rga.exe"
  failed_when: false
