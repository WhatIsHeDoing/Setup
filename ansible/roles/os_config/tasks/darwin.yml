---
- name: Install VS Code extensions
  ansible.builtin.command: "code --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  changed_when: false
  failed_when: false

# Finder
- name: Show all file extensions in Finder
  community.general.osx_defaults:
      domain: com.apple.finder
      key: AppleShowAllExtensions
      type: bool
      value: true
  notify: Restart Finder

- name: Show path bar in Finder
  community.general.osx_defaults:
      domain: com.apple.finder
      key: ShowPathbar
      type: bool
      value: true
  notify: Restart Finder

- name: Show status bar in Finder
  community.general.osx_defaults:
      domain: com.apple.finder
      key: ShowStatusBar
      type: bool
      value: true
  notify: Restart Finder

- name: Disable extension-change warning dialog
  community.general.osx_defaults:
      domain: com.apple.finder
      key: FXEnableExtensionChangeWarning
      type: bool
      value: false
  notify: Restart Finder

- name: Show hidden files in Finder
  community.general.osx_defaults:
      domain: com.apple.finder
      key: AppleShowAllFiles
      type: bool
      value: true
  notify: Restart Finder

- name: Default Finder view to list layout
  community.general.osx_defaults:
      domain: com.apple.finder
      key: FXPreferredViewStyle
      type: string
      value: Nlsv
  notify: Restart Finder

- name: Set Finder list view sort column to name
  ansible.builtin.shell: |
      plist="{{ ansible_env.HOME }}/Library/Preferences/com.apple.finder.plist"
      /usr/libexec/PlistBuddy -c "Set :StandardViewSettings:ListViewSettings:sortColumn name" "$plist" 2>/dev/null \
          || /usr/libexec/PlistBuddy -c "Add :StandardViewSettings:ListViewSettings:sortColumn string name" "$plist"
  changed_when: false
  notify: Restart Finder

- name: Set Finder list view icon size to large
  ansible.builtin.shell: |
      plist="{{ ansible_env.HOME }}/Library/Preferences/com.apple.finder.plist"
      /usr/libexec/PlistBuddy -c "Set :StandardViewSettings:ListViewSettings:iconSize 32" "$plist" 2>/dev/null \
          || /usr/libexec/PlistBuddy -c "Add :StandardViewSettings:ListViewSettings:iconSize integer 32" "$plist"
  changed_when: false
  notify: Restart Finder

- name: Set VS Code as default app for Markdown files
  ansible.builtin.command: duti -s com.microsoft.VSCode net.daringfireball.markdown all
  changed_when: false

# Dock
- name: Auto-hide the Dock
  community.general.osx_defaults:
      domain: com.apple.dock
      key: autohide
      type: bool
      value: true
  notify: Restart Dock

- name: Hide recent apps section in Dock
  community.general.osx_defaults:
      domain: com.apple.dock
      key: show-recents
      type: bool
      value: false
  notify: Restart Dock

- name: Minimise windows into their application icon
  community.general.osx_defaults:
      domain: com.apple.dock
      key: minimize-to-application
      type: bool
      value: true
  notify: Restart Dock

# Screenshots
- name: Set screenshot format to PNG
  community.general.osx_defaults:
      domain: com.apple.screencapture
      key: type
      type: string
      value: png

- name: Disable drop-shadow on screenshots
  community.general.osx_defaults:
      domain: com.apple.screencapture
      key: disable-shadow
      type: bool
      value: true

# Keyboard
- name: Set fast key repeat rate
  community.general.osx_defaults:
      domain: NSGlobalDomain
      key: KeyRepeat
      type: int
      value: 2

- name: Set short initial key repeat delay
  community.general.osx_defaults:
      domain: NSGlobalDomain
      key: InitialKeyRepeat
      type: int
      value: 15

# Misc
- name: Suppress .DS_Store creation on network volumes
  community.general.osx_defaults:
      domain: com.apple.desktopservices
      key: DSDontWriteNetworkStores
      type: bool
      value: true

- name: Suppress .DS_Store creation on USB volumes
  community.general.osx_defaults:
      domain: com.apple.desktopservices
      key: DSDontWriteUSBStores
      type: bool
      value: true
