---
- name: Configure global git settings
  community.general.git_config:
      name: "{{ item.key }}"
      value: "{{ item.value }}"
      scope: global
  loop: "{{ git_config | dict2items }}"

- name: Configure Windows-specific git settings
  community.general.git_config:
      name: "{{ item.key }}"
      value: "{{ item.value }}"
      scope: global
  loop:
      - key: "core.autocrlf"
        value: "true"
      - key: "credential.helper"
        value: "wincred"
  when: ansible_os_family == "Windows"

- name: Enable Git LFS (macOS)
  ansible.builtin.command: git lfs install
  changed_when: false
  when: ansible_os_family == "Darwin"

- name: Configure git user identity
  community.general.git_config:
      name: "{{ item.key }}"
      value: "{{ item.value }}"
      scope: global
  loop:
      - key: "user.name"
        value: "{{ git_user_name }}"
      - key: "user.email"
        value: "{{ git_user_email }}"
  when: git_user_name is defined and git_user_email is defined

- name: Configure SSH commit and tag signing
  community.general.git_config:
      name: "{{ item.key }}"
      value: "{{ item.value }}"
      scope: global
  loop:
      - key: "gpg.format"
        value: "ssh"
      - key: "user.signingkey"
        value: "{{ git_signing_key }}"
      - key: "commit.gpgsign"
        value: "true"
      - key: "tag.gpgsign"
        value: "true"
  when: git_signing_key is defined

- name: Reminder about git signing
  ansible.builtin.debug:
      msg: |
          Git signing is not enabled. Set git_signing_key in
          ansible/inventory/group_vars/local.yml to your SSH public key
          (e.g. from Bitwarden) to sign commits and tags automatically.
  when: git_signing_key is not defined
