---
- name: Handle Windows runtimes and global packages
  ansible.builtin.include_tasks: windows.yml
  when: effective_platform == "windows"

# ── Rust (rustup) ────────────────────────────────────────────────────────
- name: Install rustup
  ansible.builtin.shell: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y # noqa: risky-shell-pipe
  args:
      creates: "{{ ansible_env.HOME }}/.cargo/bin/rustup"
  when: effective_platform != "windows"

- name: Update Rust toolchain via rustup
  ansible.builtin.command: rustup update
  environment:
      PATH: "{{ cargo_bin }}:{{ ansible_env.PATH }}"
  changed_when: true
  when: effective_platform != "windows"

# ── Node.js (nvm) ────────────────────────────────────────────────────────
- name: Install nvm (macOS via Homebrew)
  community.general.homebrew:
      name: nvm
      state: present
  when: effective_platform == "darwin"

- name: Install nvm (Ubuntu via official installer)
  ansible.builtin.shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash # noqa: risky-shell-pipe
  args:
      creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  when: effective_platform == "debian"

- name: Install Node.js LTS via nvm
  ansible.builtin.shell: |
    . {{ nvm_sh }}
    nvm install --lts
    nvm alias default lts/*
  args:
      executable: /bin/bash
  changed_when: false
  when: effective_platform != "windows"

# ── Python (uv) ──────────────────────────────────────────────────────────
- name: Install uv (macOS via Homebrew)
  community.general.homebrew:
      name: uv
      state: present
  when: effective_platform == "darwin"

- name: Install uv (Ubuntu via official installer)
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh # noqa: risky-shell-pipe
  args:
      creates: "{{ ansible_env.HOME }}/.local/bin/uv"
  when: effective_platform == "debian"

- name: Install latest Python via uv
  ansible.builtin.command: uv python install
  environment:
      PATH: "{{ homebrew_bin }}:{{ local_bin }}:{{ ansible_env.PATH }}"
  changed_when: false
  when: effective_platform != "windows"

# ── pnpm (Ubuntu only — macOS uses Homebrew, Windows uses WinGet) ─────────
- name: Install pnpm (Ubuntu via standalone installer)
  ansible.builtin.shell: |
    curl -fsSL https://get.pnpm.io/install.sh | sh - # noqa: risky-shell-pipe
  args:
      creates: "{{ ansible_env.HOME }}/.local/share/pnpm/pnpm"
  when: effective_platform == "debian"

# ── Global packages ──────────────────────────────────────────────────────
# cargo-binstall fetches prebuilt release binaries instead of compiling each
# crate from source — seconds rather than minutes — and falls back to a source
# build only when no prebuilt artefact exists. Re-running is idempotent: it
# skips a crate already at the latest version, which also folds the old
# `cargo install-update -a` pass into this one loop.
- name: Install cargo-binstall
  ansible.builtin.shell: |
    curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash # noqa: risky-shell-pipe
  args:
      creates: "{{ ansible_env.HOME }}/.cargo/bin/cargo-binstall"
  when: effective_platform != "windows"

- name: Install global Cargo packages via cargo-binstall
  ansible.builtin.command: "cargo binstall --no-confirm {{ item }}"
  loop: "{{ cargo_packages + (cargo_packages_non_darwin if effective_platform != 'darwin' else []) }}"
  environment:
      PATH: "{{ cargo_bin }}:{{ ansible_env.PATH }}"
  changed_when: false
  failed_when: false
  when: effective_platform != "windows"

- name: Install global pnpm packages (macOS)
  ansible.builtin.command: "pnpm add -g {{ pnpm_packages | join(' ') }}"
  environment:
      PATH: "{{ homebrew_bin }}:{{ pnpm_bin }}:{{ ansible_env.PATH }}"
      PNPM_HOME: "{{ pnpm_home }}"
  changed_when: false
  when: effective_platform == "darwin"

- name: Install global pnpm packages (Ubuntu)
  ansible.builtin.command: "pnpm add -g {{ pnpm_packages | join(' ') }}"
  environment:
      PATH: "{{ pnpm_bin }}:{{ ansible_env.PATH }}"
      PNPM_HOME: "{{ pnpm_home }}"
  changed_when: false
  when: effective_platform == "debian"

- name: Install Python tools via uv
  ansible.builtin.command: "uv tool install {{ item }}"
  loop: "{{ pip_packages }}"
  environment:
      PATH: "{{ homebrew_bin }}:{{ local_bin }}:{{ ansible_env.PATH }}"
  changed_when: false
  failed_when: false
  when: effective_platform != "windows"
