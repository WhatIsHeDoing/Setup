---
- name: Include Windows runtime variables
  ansible.builtin.include_vars: windows.yml

- name: Install WinGet runtimes
  ansible.builtin.command: >
      winget.exe install {{ item }}
      --accept-source-agreements
      --accept-package-agreements
      --silent
      --disable-interactivity
  loop: "{{ winget_runtimes }}"
  changed_when: false
  failed_when: false

- name: Install Visual Studio Build Tools with C++ workload
  ansible.builtin.command: >
      winget.exe install Microsoft.VisualStudio.2022.BuildTools
      --accept-source-agreements
      --accept-package-agreements
      --silent
      --disable-interactivity
      --override "--quiet --add Microsoft.VisualStudio.Workload.VCTools --includeRecommended"
  changed_when: false
  failed_when: false

# Refresh PATH from registry after WinGet installs before calling newly installed binaries
- name: Install Node.js LTS via nvm-windows
  ansible.windows.win_powershell:
      script: |
          $env:PATH = [System.Environment]::GetEnvironmentVariable('PATH','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('PATH','User')
          nvm install lts
          nvm use lts
  changed_when: false
  failed_when: false

- name: Update Rust toolchain
  ansible.builtin.command: rustup.exe update
  changed_when: true
  failed_when: false

- name: Install global Cargo packages
  ansible.builtin.command: "cargo.exe install {{ item }}"
  loop: "{{ cargo_packages + cargo_packages_non_darwin }}"
  changed_when: false
  failed_when: false

- name: Update all installed Cargo packages
  ansible.builtin.command: cargo.exe install-update -a
  changed_when: false
  failed_when: false

- name: Install global pnpm packages
  ansible.builtin.command: "pnpm.exe add -g {{ pnpm_packages | join(' ') }}"
  changed_when: false
  failed_when: false

- name: Install Python tools via uv
  ansible.builtin.command: "uv.exe tool install {{ item }}"
  loop: "{{ pip_packages }}"
  changed_when: false
  failed_when: false
