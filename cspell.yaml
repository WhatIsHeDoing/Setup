    - behaviors->behaviours
    - catalog->catalogue
    - center->centre
    - customize->customise
    - customized->customised
    - defense->defence
    - favorite->favourite
    - finalize->finalise
    - fulfill->fulfil
    - initialize->initialise
    - initialized->initialised
    - invokable->invocable
    - normalize->normalise
    - organization->organisation
    - organize->organise
    - organized->organised
    - prioritize->prioritise
    - recognize->recognise
    - recognized->recognised
    - synchronize->synchronise
    - traveler->traveller
