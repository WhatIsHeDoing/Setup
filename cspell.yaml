---
# Spell-check config. See the cspell skill: words vs ignoreWords vs flagWords.
$schema: https://raw.githubusercontent.com/streetsidesoftware/cspell/main/cspell.schema.json
version: "0.2"
# en keeps American spellings valid for code tokens (color, gray); flagWords
# below enforce British spelling in prose.
language: en,en-GB
ignorePaths:
    - .claude/
    - .git/
    - collections/
    - cspell.yaml
    - node_modules/
    - resolve.sh
    - "*.lock"
    - "*.retry"
