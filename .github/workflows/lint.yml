---
name: Lint

on:
    push:
    pull_request:

jobs:
    lefthook:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7.0.0

            # yamllint + shellcheck come from apt; cspell, markdownlint-cli2,
            # lefthook and taplo are npm-native (no apt package). npm and node
            # are preinstalled on the runner. gitleaks is skipped here — the
            # trivy job already scans for secrets in CI.
            - name: Install hook tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y shellcheck yamllint
                  npm install -g lefthook cspell markdownlint-cli2 @taplo/cli

            - name: Run lefthook checks
              env:
                  LEFTHOOK_EXCLUDE: gitleaks
              run: lefthook run pre-commit --all-files

    actionlint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7.0.0

            - name: Run actionlint
              run: |
                  curl -sSfL -o actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz
                  tar xzf actionlint.tar.gz actionlint
                  ./actionlint -color

    ansible-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7.0.0

            - uses: actions/setup-python@v6.3.0
              with:
                  python-version: "3.12"

            - name: Install Ansible
              run: pip install ansible-core ansible-lint

            - name: Install Ansible collections
              run: ansible-galaxy collection install -r ansible/requirements.yml

            - name: Run ansible-lint
              run: ansible-lint

    powershell-lint:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v7.0.0

            - name: Install PSScriptAnalyzer
              shell: pwsh
              run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

            - name: Run PSScriptAnalyzer
              shell: pwsh
              run: |
                  $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error, Warning
                  $results | Format-Table -AutoSize
                  if ($results.Count -gt 0) { exit 1 }

    trivy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7.0.0

            - uses: aquasecurity/trivy-action@v0.36.0
              with:
                  scan-type: fs
                  scanners: secret,misconfig
                  exit-code: "1"
