[defaults]
roles_path            = ansible/roles
collections_path      = ./collections:~/.ansible/collections
display_skipped_hosts = False
# Gather only the facts these playbooks read (env → HOME/PATH/WSL,
# platform → kernel/system, distribution → os_family). Skips the slow
# hardware, mount, network and virtualisation probes. Override per-play
# with `gather_subset:` if a future playbook needs more.
gather_subset         = !all,!min,distribution,env,platform
inject_facts_as_vars  = True
result_format         = yaml
callbacks_enabled     = ansible.builtin.timer, ansible.posix.profile_tasks, community.general.selective
# Wait longer for become (sudo) to succeed. On macOS, Touch ID via pam_tid
# pops a GUI dialog and the 10s default expires before a slow fingerprint
# tap, failing with "Timed out waiting for become success".
timeout               = 30
